<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivo | Provider Submissions</title>
    <!-- Use the existing homepage styles, along with custom overrides for the dashboard -->
    <link rel="stylesheet" href="../home%20page/styles.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div>
    </div>

    <!-- Admin Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="../logo.png" alt="Festivo" style="height: 40px; vertical-align: middle;">
            </a>
            
            <div class="nav-links" id="navLinks">
                <a href="index.html">Dashboard</a>
                <a href="products.html">Products</a>
                <a href="submissions.html" class="active">Submissions</a>
                <a href="orders.html">Orders</a>
                <a href="occasions.html">Occasions</a>
                
                <a href="../home%20page/index.html" class="logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px; vertical-align: text-bottom;"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Logout
                </a>
            </div>

            <button class="menu-toggle" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main>
        <section class="section-container" style="margin-top: 80px; padding-bottom: 50px;">
            <div class="add-head">
                <h1 class="section-title" style="text-align: left; margin: 0;">Provider Submissions</h1>
            </div>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Review incoming vendor proposals and approve media forms.</p>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Provider</th>
                            <th>Service Type</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td><strong>Cake Wonders</strong></td>
                            <td>Catering</td>
                            <td><span class="status-badge status-pending">Pending</span></td>
                            <td>
                                <button class="admin-action-btn view-btn" onclick="alert('Viewing Media Format Details: Full Image Attachments Loaded.')">View Media</button>
                                <button class="admin-action-btn approve-btn">Approve</button>
                                <button class="admin-action-btn reject-btn">Reject</button>
                            </td>
                        </tr>
                        <tr>
                            <td><strong>Elite Draping</strong></td>
                            <td>Decorations</td>
                            <td><span class="status-badge status-approved">Approved</span></td>
                            <td>
                                <button class="admin-action-btn view-btn" onclick="alert('Viewing Media Format Details...')">View Media</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
            this.classList.toggle('open');
        });
        
        document.querySelector('.logout-btn').addEventListener('click', function(e) {
            e.preventDefault();
            if(confirm('Are you sure you want to log out?')) {
                window.location.href = this.getAttribute('href');
            }
        });
    </script>
</body>
</html>
