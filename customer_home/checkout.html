<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivo | Review Your Order</title>
    <link rel="stylesheet" href="../home%20page/styles.css">
    <link rel="stylesheet" href="customer.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Background Shapes -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="../logo.png" alt="Festivo" style="height: 40px; vertical-align: middle;">
            </a>

            <div class="nav-links" id="navLinks">
                <a href="index.html">HOME</a>
                <a href="occasions.html">Occasions</a>
                <a href="products.html">Products</a>
                <a href="catering.html">Catering</a>

                <a href="checkout.html" class="cart-icon active" title="My Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </a>

                <a href="../home%20page/index.html" class="logout-btn">
                    Logout
                </a>
            </div>

            <button class="menu-toggle" id="mobileMenuBtn">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <main style="margin-top: 80px; padding-bottom: 50px;">
        <div class="checkout-container">
            <a href="javascript:history.back()" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back to Selection
            </a>
            
            <h1 class="section-title" style="text-align: left; margin-top: 1rem;">Review Your Package</h1>
            <p style="color: var(--text-muted); margin-bottom: 3rem;">Finalize your event details and confirm your selection.</p>

            <table class="checkout-table" id="checkoutTable">
                <thead>
                    <tr>
                        <th>Item Description</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="cartItemsList">
                    <!-- Dynamically populated -->
                </tbody>
            </table>

            <div class="order-footer">
                <div class="grand-total">
                    <span class="grand-total-label">Total Amount:</span>
                    <span class="grand-total-value" id="grandTotal">$0.00</span>
                </div>
                <button class="primary-btn" id="confirmOrderBtn" style="padding: 1.2rem 3rem; font-size: 1.1rem;">
                    Proceed
                </button>
            </div>
            
            <div id="emptyState" style="display: none; text-align: center; padding: 5rem 2rem;">
                <div style="font-size: 4rem; margin-bottom: 1.5rem;">🛒</div>
                <h2>Your package is empty</h2>
                <p style="color: var(--text-muted); margin-bottom: 2rem;">Go back and select some decor or catering for your event.</p>
                <a href="products.html" class="primary-btn" style="display: inline-block;">Start Selection</a>
            </div>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem('festivoCart')) || [];
        const eventData = JSON.parse(localStorage.getItem('festivoEvent')) || { hours: 1 };
        const hours = eventData.hours || 1;

        function init() {
            renderCart();
            updateCartBadge();

            document.getElementById('mobileMenuBtn').addEventListener('click', () => {
                document.getElementById('navLinks').classList.toggle('active');
            });
        }

        function renderCart() {
            const list = document.getElementById('cartItemsList');
            const table = document.getElementById('checkoutTable');
            const footer = document.querySelector('.order-footer');
            const emptyState = document.getElementById('emptyState');

            if (cart.length === 0) {
                table.style.display = 'none';
                footer.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            footer.style.display = 'flex';
            emptyState.style.display = 'none';

            list.innerHTML = cart.map((item, index) => {
                const itemQuantity = item.quantity || 1;
                const itemHours = item.type ? 1 : hours;
                const subtotal = item.price * itemQuantity * itemHours;
                const options = [];
                if (item.color) options.push(`Color: ${item.color}`);
                if (item.flavor) options.push(`Flavor: ${item.flavor}`);
                if (item.size) options.push(`Size: ${item.size}`);

                return `
                    <tr class="checkout-row">
                        <td data-label="Item Description">
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <span style="font-size: 1.5rem;">${item.icon || '📦'}</span>
                                <div>
                                    <div style="font-weight: 600;">${item.name}</div>
                                    <div class="item-meta">${options.join(' • ')}</div>
                                </div>
                            </div>
                        </td>
                        <td data-label="Price" class="math-calc">$${item.price.toFixed(2)}${itemHours > 1 ? ` x ${itemHours} hr(s)` : ''}</td>
                        <td data-label="Quantity" class="math-calc">
                            x${itemQuantity}
                        </td>
                        <td data-label="Total">
                            <div class="row-total">$${subtotal.toFixed(2)}</div>
                            <div style="font-size: 0.7rem; color: var(--text-muted);" class="math-calc">
                                ($${item.price.toFixed(2)} x ${itemQuantity}${itemHours > 1 ? ` x ${itemHours}hr` : ''})
                            </div>
                        </td>
                        <td style="text-align: right;">
                            <button onclick="removeItem(${index})" style="background: none; border: none; color: var(--accent); cursor: pointer; padding: 0.5rem;" title="Remove">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');

            updateTotal();
        }

        window.removeItem = function(index) {
            cart.splice(index, 1);
            localStorage.setItem('festivoCart', JSON.stringify(cart));
            renderCart();
            updateCartBadge();
        };

        function updateTotal() {
            const total = cart.reduce((s, i) => {
                const itemHours = i.type ? 1 : hours;
                return s + (i.price * (i.quantity || 1) * itemHours);
            }, 0);
            document.getElementById('grandTotal').innerText = `$${total.toFixed(2)}`;
        }

        function updateCartBadge() {
            const badge = document.getElementById('cartBadge');
            if (badge) badge.innerText = cart.length;
        }

        document.getElementById('confirmOrderBtn').addEventListener('click', () => {
            if (cart.length === 0) return alert('Your cart is empty.');
            window.location.href = 'payment.html';
        });

        init();
    </script>
</body>

</html>
