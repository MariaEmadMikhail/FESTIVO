<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festivo | Login</title>
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div class="container">
        <div class="login-box">
            <div class="header">
                <h1>Welcome Back</h1>
                <p>Login to continue your Festivo experience</p>
            </div>
            
            <form id="login-form" action="/FESTIVO/backend/login.php" method="POST">
                <div class="input-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" name="username" placeholder="johndoe123" required>
                </div>

                <div class="input-group" id="passwordGroup">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                </div>

                <div class="forgot-password" id="forgotPwdWrapper">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>

                <div class="error-message" id="loginError">
                    Wrong username or password. Please try again.
                </div>

                <div class="actions" id="actionButtons">
                    <button type="submit" class="submit-btn user-btn" id="mainSubmitBtn">Log In</button>
                    <!-- Admin login icon/button -->
                    <button type="button" class="submit-btn admin-btn" id="adminLoginBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px; vertical-align: text-bottom;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Log in as Admin
                    </button>
                </div>
            </form>

            <div id="socialBox">
                <div class="divider"><span>Or continue with</span></div>
                
                <div class="social-login">
                    <button type="button" class="social-btn" id="googleLoginBtn">
                        <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                </div>
                <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
            </div>

            <!-- New 2FA / OTP Verification Step -->
            <div id="otpVerificationStep" style="display: none;">
                <div style="text-align: center; margin-bottom: 2rem;">
                    <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Verification</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">We need to verify your identity.</p>
                </div>
                
                <div id="otpSelectionGroup" style="margin-bottom: 1.5rem;">
                    <p style="margin-bottom: 1rem; font-size: 0.95rem; text-align: center; color: var(--text-muted);">Send code via:</p>
                    <div style="display: flex; gap: 1rem;">
                        <label class="social-btn otp-method-label" style="flex: 1; margin: 0; border-color: var(--secondary); background: rgba(0, 206, 201, 0.1);">
                            <input type="radio" name="otpMethod" value="email" checked style="display: none;">
                            Email
                        </label>
                        <label class="social-btn otp-method-label" style="flex: 1; margin: 0;">
                            <input type="radio" name="otpMethod" value="sms" style="display: none;">
                            SMS
                        </label>
                    </div>
                    <button type="button" class="submit-btn" id="requestOtpBtn" style="margin-top: 1.5rem; background: transparent; border: 1px solid var(--secondary); color: var(--secondary);">Send Verification Code</button>
                </div>

                <div id="otpInputGroup" style="display: none;">
                    <div class="input-group">
                        <label for="verificationCode" style="text-align: center;">Enter 6-digit Code</label>
                        <input type="text" id="verificationCode" placeholder="123456" style="text-align: center; letter-spacing: 5px; font-size: 1.2rem;">
                        <span class="error" id="verificationError" style="text-align: center; margin-top: 0.5rem; width: 100%;">Invalid code. Try 123456</span>
                    </div>
                    <button type="button" class="submit-btn user-btn" id="verifyOtpBtn">Verify & Proceed</button>
                    <div style="text-align: center; margin-top: 1rem;">
                        <a href="#" id="resendCodeLink" style="color: var(--text-muted); text-decoration: none; font-size: 0.85rem;">Didn't receive code? Resend</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
